services:
  db:
    image: postgres:16-alpine
    container_name: print-shop-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: printshop
      POSTGRES_PASSWORD: printshop
      POSTGRES_DB: printshop
    ports:
      - "15433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U printshop"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  pgdata:
